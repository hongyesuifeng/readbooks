<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>и¶…зә§е№»жғізҺӢеӣҪ - WebзүҲ</title>
<style>
:root {
  --bg: #1a1a2e; --panel: #16213e; --gold: #f0c040;
  --wood: #b8860b; --stone: #808080; --food: #ff6b6b;
  --glory: #a855f7; --hp: #4ade80; --danger: #ef4444; --text: #e2e8f0;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #0a0a1a;
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; font-family: 'Segoe UI', system-ui, sans-serif;
  overflow: hidden;
}
#container {
  position: relative;
  width: 100vw; height: 100vh;
  max-width: 1100px; max-height: 800px;
  display: flex; flex-direction: column;
}
#top-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 12px; background: var(--panel);
  border-bottom: 2px solid #2a2a4e; gap: 8px; flex-wrap: wrap;
  z-index: 10;
}
#top-bar h1 { font-size: 1em; color: var(--gold); white-space: nowrap; }
#res-bar { display: flex; gap: 8px; flex-wrap: wrap; }
.res { display: flex; align-items: center; gap: 3px; padding: 3px 8px;
  background: rgba(255,255,255,0.06); border-radius: 6px; font-size: 0.8em; }
.res .icon { font-size: 1.1em; }
.res .val { font-weight: bold; min-width: 2.5em; text-align: right; }
#phase-info { font-size: 0.8em; color: #aaa; white-space: nowrap; }
#phase-info span { color: var(--gold); font-weight: bold; }
#canvas-wrap {
  flex: 1; position: relative; overflow: hidden;
  background: #0a0a1a;
}
canvas { display: block; width: 100%; height: 100%; }
#bottom-bar {
  display: flex; gap: 6px; padding: 8px 12px;
  background: var(--panel); border-top: 2px solid #2a2a4e;
  justify-content: center; flex-wrap: wrap; z-index: 10;
}
.btn {
  padding: 8px 16px; border: none; border-radius: 8px;
  cursor: pointer; font-weight: bold; font-size: 0.85em;
  transition: all 0.15s; letter-spacing: 0.5px;
}
.btn:hover { filter: brightness(1.2); transform: translateY(-1px); }
.btn:active { transform: scale(0.96); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; filter: none; transform: none; }
.btn-build { background: #3b82f6; color: white; }
.btn-recruit { background: #8b5cf6; color: white; }
.btn-item { background: #a855f7; color: white; }
.btn-end { background: #ef4444; color: white; font-size: 0.95em; }
.btn-fight { background: #f59e0b; color: #1a1a2e; font-size: 0.95em; }
.btn-hero { background: #ec4899; color: white; font-size: 0.95em; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(236,72,153,0.4)} 50%{box-shadow:0 0 0 8px rgba(236,72,153,0)} }

/* Menu overlay */
#menu-overlay {
  position: absolute; top:0; left:0; right:0; bottom:0;
  background: rgba(0,0,0,0.7); display: flex;
  justify-content: center; align-items: center; z-index: 20;
}
#menu-panel {
  background: var(--panel); border: 2px solid var(--gold);
  border-radius: 12px; padding: 16px; max-width: 500px;
  max-height: 80vh; overflow-y: auto;
}
#menu-panel h3 { color: var(--gold); margin-bottom: 8px; text-align: center; }
.menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.menu-card {
  background: rgba(255,255,255,0.05); border: 1px solid #333;
  border-radius: 8px; padding: 8px; cursor: pointer; text-align: center;
  transition: all 0.15s; color: var(--text); font-size: 0.8em;
}
.menu-card:hover { border-color: var(--gold); background: rgba(255,255,255,0.1); }
.menu-card.disabled { opacity: 0.35; cursor: not-allowed; }
.menu-card .title { font-weight: bold; color: var(--gold); font-size: 1em; }
.menu-card .sub { color: #999; font-size: 0.85em; margin: 2px 0; }
.menu-card .price { color: #aaa; font-size: 0.8em; }
.menu-close {
  display: block; margin: 10px auto 0; padding: 6px 20px;
  background: #333; color: white; border: none; border-radius: 6px; cursor: pointer;
}

/* Toast */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: var(--panel); border: 1px solid var(--gold);
  padding: 8px 20px; border-radius: 20px; font-weight: bold;
  z-index: 100; animation: fadeOut 2s forwards; font-size: 0.85em;
}
@keyframes fadeOut { 0%,70%{opacity:1} 100%{opacity:0} }

/* Battle log */
#battle-log {
  position: absolute; bottom: 8px; left: 8px; right: 8px;
  max-height: 80px; overflow-y: auto; font-size: 0.7em;
  color: #ccc; background: rgba(0,0,0,0.6); padding: 4px 8px;
  border-radius: 4px; pointer-events: none; z-index: 5;
  line-height: 1.4;
}
</style>
</head>
<body>
<div id="container">
  <div id="top-bar">
    <h1>рҹҸ° и¶…зә§е№»жғізҺӢеӣҪ</h1>
    <div id="res-bar"></div>
    <div id="phase-info"></div>
  </div>
  <div id="canvas-wrap">
    <canvas id="gc"></canvas>
    <div id="menu-overlay" style="display:none;"><div id="menu-panel"></div></div>
    <div id="battle-log"></div>
  </div>
  <div id="bottom-bar"></div>
</div>

<script>
// ==================== жёёжҲҸеёёйҮҸ ====================
const TILE = 56;  // ж јеӯҗеӨ§е°ҸпјҲйҖ»иҫ‘еғҸзҙ пјү
const MAP_W = 12, MAP_H = 7; // ең°еӣҫж јж•°
const COLORS = {
  grass: '#3d5a1e', grass2: '#4a6b28', path: '#8b7355',
  wall: '#6b6b6b', lumber: '#8b4513', quarry: '#888',
  farm: '#c8b400', tavern: '#c05020', barracks: '#555',
  night: '#0d0d2a', hero: '#f0c040', ally: '#4ade80',
  enemy: '#ef4444', boss: '#ff4444',
};
const BUILD_DEFS = {
  lumber: { name:'дјҗжңЁеңә', icon:'рҹӘ“', color:COLORS.lumber, cost:{gold:3}, prod:{wood:2}, max:5, desc:'ж—Ҙдә§жңЁжқҗ+2' },
  quarry: { name:'йҮҮзҹіеңә', icon:'вӣҸпёҸ', color:COLORS.quarry, cost:{gold:3}, prod:{stone:2}, max:5, desc:'ж—Ҙдә§зҹіж–ҷ+2' },
  farm:   { name:'еҶңеңә', icon:'рҹҢҫ', color:COLORS.farm, cost:{gold:5}, prod:{food:3}, max:5, desc:'ж—Ҙдә§йЈҹзү©+3' },
  tavern: { name:'й…’йҰҶ', icon:'рҹҚә', color:COLORS.tavern, cost:{wood:8,food:4}, max:1, desc:'жҲҳеҗҺеӣһеӨҚ25%HP' },
  wall:   { name:'еҹҺеўҷ', icon:'рҹ§ұ', color:COLORS.wall, cost:{stone:10}, max:4, desc:'е…ЁеҚ•дҪҚ+3йҳІеҫЎ' },
};
const UNIT_DEFS = {
  sword: { name:'еү‘еЈ«', icon:'рҹӣЎпёҸ', cost:{wood:5,gold:4}, hp:40, atk:7, def:5, role:'tank', color:'#60a5fa', desc:'еүҚжҺ’еқҰе…Ӣ' },
  archer:{ name:'еј“жүӢ', icon:'рҹҸ№', cost:{wood:3,gold:6}, hp:25, atk:12,def:2, role:'dps', color:'#34d399', desc:'еҗҺжҺ’иҫ“еҮә' },
  priest:{ name:'еғ§дҫЈ', icon:'рҹ’ҡ', cost:{food:5,gold:5}, hp:20, atk:3, def:1, role:'healer', color:'#fbbf24', desc:'жІ»з–—еҸӢеҶӣ', heal:6 },
  knight:{ name:'йӘ‘еЈ«', icon:'вҡңпёҸ', cost:{wood:10,stone:5,gold:12}, hp:55, atk:16,def:6, role:'elite', color:'#c084fc', desc:'зІҫиӢұе…ЁиғҪ' },
};
const ITEM_DEFS = {
  sharp:{ name:'еҲ©еҲғ', icon:'рҹ—ЎпёҸ', cost:{glory:8}, desc:'е…ЁдҪ“ж”»еҮ»+3', apply(s){ for(let u of s.units){u.atk+=3;u.baseAtk+=3} } },
  armor:{ name:'й“Ғз”І', icon:'рҹӣЎпёҸ', cost:{glory:8}, desc:'е…ЁдҪ“йҳІеҫЎ+2', apply(s){ for(let u of s.units){u.def+=2;u.baseDef+=2} } },
  vital:{ name:'жҙ»еҠӣ', icon:'вқӨпёҸ', cost:{glory:10}, desc:'е…ЁдҪ“з”ҹе‘Ҫ+10', apply(s){ for(let u of s.units){u.maxHp+=10;u.hp+=10} } },
  heroB:{ name:'иӢұйӣ„еҲғ', icon:'вҡЎ', cost:{glory:12}, desc:'иӢұйӣ„ж”»еҮ»+8', apply(s){ s.hero.atk+=8;s.hero.baseAtk+=8 } },
  herb: { name:'иҚҜиҚү', icon:'рҹҢҝ', cost:{glory:15}, desc:'жҜҸжіўеҗҺеӣһ10%HP', apply(s){} },
};
const MONSTERS = [
  { name:'е“Ҙеёғжһ—', icon:'рҹ‘ә', hp:12, atk:4, def:1, color:'#86efac' },
  { name:'йӘ·й«…', icon:'рҹ’Җ', hp:15, atk:5, def:2, color:'#d4d4d8' },
  { name:'жҡ—зӢј', icon:'рҹҗә', hp:10, atk:8, def:0, color:'#6b7280' },
  { name:'зҹіеғҸй¬ј', icon:'рҹ—ҝ', hp:20, atk:3, def:4, color:'#78716c' },
  { name:'жҒ¶йӯ”', icon:'рҹ‘ҝ', hp:18, atk:6, def:1, color:'#f87171' },
  { name:'е№ҪзҒө', icon:'рҹ‘»', hp:12, atk:7, def:0, color:'#a78bfa' },
  { name:'иңҳиӣӣ', icon:'рҹ•·пёҸ', hp:25, atk:5, def:2, color:'#4b5563' },
  { name:'зӮҺйӯ”', icon:'рҹ”Ҙ', hp:22, atk:9, def:1, color:'#f97316' },
];
const BOSSES = [
  { name:'е“Ҙеёғжһ—зҺӢ', icon:'рҹ‘№', hp:60, atk:12, def:4, color:'#dc2626' },
  { name:'жҡ—й»‘жі•еёҲ', icon:'рҹ§ҷвҖҚвҷӮпёҸ', hp:80, atk:15, def:3, color:'#7c3aed' },
  { name:'дәЎзҒөе°ҶеҶӣ', icon:'рҹ’Җвҡ”пёҸ', hp:100, atk:18, def:5, color:'#991b1b' },
  { name:'е·Ёйҫҷ', icon:'рҹҗІ', hp:150, atk:22, def:6, color:'#b45309' },
  { name:'йӯ”зҺӢ', icon:'рҹ‘‘рҹ’Җ', hp:200, atk:28, def:8, color:'#7f1d1d' },
];
const HEROES = [
  { name:'зҒ«з„°йўҶдё»', icon:'рҹ”Ҙ', ab:'зғҲз„°йЈҺжҡҙ', abDesc:'еҜ№жүҖжңүжҖӘзү©йҖ жҲҗиӢұйӣ„ж”»еҮ»Г—2дјӨе®і', cd:3, color:'#f97316' },
  { name:'еҶ°йңңеҘізҺӢ', icon:'вқ„пёҸ', ab:'жһҒеҜ’еҶ°е°Ғ', abDesc:'еҶ»з»“жүҖжңүжҖӘзү©1еӣһеҗҲ', cd:4, color:'#38bdf8' },
  { name:'еңЈе…үйӘ‘еЈ«', icon:'вңЁ', ab:'зҘһеңЈжҠӨзӣҫ', abDesc:'е…ЁдҪ“еӣһеӨҚиӢұйӣ„ж”»еҮ»Г—1.5зҡ„HP', cd:3, color:'#fbbf24' },
];

// ==================== жёёжҲҸзҠ¶жҖҒ ====================
const S = {
  phase: 'heroSelect', // heroSelect|day|night|gameOver
  day:0, wave:0, maxWaves:3, winDays:15,
  res:{wood:15,stone:10,food:12,gold:30,glory:0},
  buildings:[], // {type, col, row}
  units:[],     // {type,name,icon,hp,maxHp,atk,def,role,color,heal,baseAtk,baseDef,x,y,tx,ty,alive}
  hero:null,    // {name,icon,hp,maxHp,atk,def,ab,cd,cdLeft,color,baseAtk,baseDef,...}
  monsters:[],  // {name,icon,hp,maxHp,atk,def,color,x,y,tx,ty,alive,isBoss,frozen}
  items:[],
  bossKills:0, unitId:0,
  dailyProd:{wood:0,stone:0,food:0,gold:0},
  buildSlot:null, // {col,row} selected build slot
  particles:[],
  battleLog:[],
  animFrame:0,
  shakeTimer:0,
};

// ==================== Canvas & е·Ҙе…·еҮҪж•° ====================
const wrap = document.getElementById('canvas-wrap');
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
let cw, ch, ox, oy, scale;
function resize() {
  const r = wrap.getBoundingClientRect();
  cw = r.width; ch = r.height;
  canvas.width = cw * (window.devicePixelRatio||1);
  canvas.height = ch * (window.devicePixelRatio||1);
  ctx.setTransform((window.devicePixelRatio||1),0,0,(window.devicePixelRatio||1),0,0);
  // и®Ўз®—зј©ж”ҫд»ҘйҖӮй…Қең°еӣҫ
  const mapPxW = MAP_W * TILE;
  const mapPxH = MAP_H * TILE;
  scale = Math.min(cw / mapPxW, ch / mapPxH, 1.2);
  ox = (cw - mapPxW * scale) / 2;
  oy = (ch - mapPxH * scale) / 2;
}
window.addEventListener('resize', resize);
resize();

function canAfford(cost) { for(let[k,v]of Object.entries(cost)){ if((S.res[k]||0)<v) return false; } return true; }
function pay(cost) { for(let[k,v]of Object.entries(cost)) S.res[k]=(S.res[k]||0)-v; }
function toast(msg) {
  const e = document.createElement('div'); e.className='toast'; e.textContent=msg;
  document.body.appendChild(e); setTimeout(()=>e.remove(),2100);
}
const R = (arr) => arr[Math.floor(Math.random()*arr.length)];

// ==================== Canvas з»ҳеҲ¶ ====================
function drawGrass() {
  for(let r=0; r<MAP_H; r++) for(let c=0; c<MAP_W; c++) {
    const x = ox + c*TILE*scale, y = oy + r*TILE*scale, s = TILE*scale;
    ctx.fillStyle = ((c+r)%2===0) ? COLORS.grass : COLORS.grass2;
    ctx.fillRect(x, y, s, s);
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.strokeRect(x, y, s, s);
  }
}

function drawPath(col, row) {
  const x = ox + col*TILE*scale, y = oy + row*TILE*scale, s = TILE*scale;
  ctx.fillStyle = COLORS.path;
  ctx.fillRect(x+4*scale, y+4*scale, s-8*scale, s-8*scale);
}

function drawBuilding(b) {
  const cfg = BUILD_DEFS[b.type];
  const x = ox + b.col*TILE*scale, y = oy + b.row*TILE*scale, s = TILE*scale;
  const pad = 6*scale;
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(x+pad+2*scale, y+pad+2*scale, s-pad*2, s-pad*2);
  // building body
  ctx.fillStyle = cfg.color;
  ctx.fillRect(x+pad, y+pad, s-pad*2, s-pad*2);
  // roof triangle
  ctx.fillStyle = shadeColor(cfg.color, -30);
  ctx.beginPath();
  ctx.moveTo(x+pad, y+pad);
  ctx.lineTo(x+s/2, y+pad/2);
  ctx.lineTo(x+s-pad, y+pad);
  ctx.closePath();
  ctx.fill();
  // border
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1.5*scale;
  ctx.strokeRect(x+pad, y+pad, s-pad*2, s-pad*2);
  // icon
  ctx.font = `${TILE*0.4*scale}px serif`;
  ctx.textAlign = 'center';
  ctx.fillText(cfg.icon, x+s/2, y+s*0.65);
  // quantity badge
  const count = S.buildings.filter(bb=>bb.type===b.type&&bb.col===b.col&&bb.row===b.row).length;
  if (count > 1) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.beginPath();
    ctx.arc(x+s-pad-5*scale, y+pad+5*scale, 8*scale, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = `bold ${9*scale}px sans-serif`;
    ctx.fillText(count, x+s-pad-5*scale, y+pad+8*scale);
  }
}

function drawBuildSlot(col, row) {
  if (S.phase !== 'day') return;
  const x = ox + col*TILE*scale, y = oy + row*TILE*scale, s = TILE*scale;
  const isSlot = S.buildSlot && S.buildSlot.col===col && S.buildSlot.row===row;
  const pulse = Math.sin(Date.now()/500) * 0.3 + 0.7;
  ctx.strokeStyle = isSlot ? `rgba(240,192,64,${pulse})` : 'rgba(255,255,255,0.1)';
  ctx.lineWidth = isSlot ? 3*scale : 1*scale;
  ctx.setLineDash(isSlot ? [4*scale, 4*scale] : []);
  ctx.strokeRect(x+2*scale, y+2*scale, s-4*scale, s-4*scale);
  ctx.setLineDash([]);
  if (isSlot) {
    ctx.fillStyle = `rgba(240,192,64,${pulse*0.2})`;
    ctx.fillRect(x+2*scale, y+2*scale, s-4*scale, s-4*scale);
    // "+" indicator
    ctx.fillStyle = `rgba(240,192,64,${pulse})`;
    ctx.font = `${TILE*0.5*scale}px sans-serif`; ctx.textAlign = 'center';
    ctx.fillText('+', x+s/2, y+s*0.6);
  }
}

function drawHeroUnit(x, y, hero, isNight) {
  const s = TILE * 0.7 * scale;
  const px = x - s/2, py = y - s/2;
  // glow
  if (isNight) {
    ctx.fillStyle = 'rgba(240,192,64,0.3)';
    ctx.beginPath(); ctx.arc(x, y, s*0.7, 0, Math.PI*2); ctx.fill();
  }
  // body
  ctx.fillStyle = COLORS.hero;
  ctx.beginPath(); ctx.arc(x, y, s/2, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2*scale;
  ctx.stroke();
  // icon
  ctx.font = `${s*0.8}px serif`; ctx.textAlign = 'center';
  ctx.fillText(hero.icon, x, y+s*0.25);
  // HP bar
  drawHpBar(x, y-s*0.65, s*0.8, 3*scale, hero.hp, hero.maxHp);
  // name
  ctx.fillStyle = '#fff'; ctx.font = `bold ${9*scale}px sans-serif`;
  ctx.fillText(hero.name, x, y+s*0.7);
}

function drawUnitSprite(u) {
  const x = u.x, y = u.y, s = TILE*0.55*scale;
  if (!u.alive) {
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.arc(x, y, s/2, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
    // tombstone
    ctx.font = `${s}px serif`; ctx.textAlign = 'center';
    ctx.fillText('рҹӘҰ', x, y+s*0.3);
    return;
  }
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(x, y+s*0.35, s*0.35, s*0.1, 0, 0, Math.PI*2); ctx.fill();
  // body (rounded rect)
  const bx = x - s*0.35, by = y - s*0.4, bw = s*0.7, bh = s*0.8;
  ctx.fillStyle = u.color;
  roundRect(bx, by, bw, bh, 4*scale);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1.5*scale;
  roundRect(bx, by, bw, bh, 4*scale);
  ctx.stroke();
  // icon
  ctx.font = `${s*0.65}px serif`; ctx.textAlign = 'center';
  ctx.fillText(u.icon, x, y+s*0.2);
  // HP bar
  drawHpBar(x, by-6*scale, bw, 2.5*scale, u.hp, u.maxHp);
}

function drawMonsterSprite(m) {
  const x = m.x, y = m.y, s = TILE*0.5*scale;
  if (!m.alive) {
    ctx.globalAlpha = 0.2;
    ctx.font = `${s}px serif`; ctx.textAlign = 'center';
    ctx.fillText('рҹ’Җ', x, y);
    ctx.globalAlpha = 1;
    return;
  }
  // frozen overlay
  if (m.frozen) {
    ctx.fillStyle = 'rgba(147,197,253,0.3)';
    const fs = s*1.2;
    ctx.beginPath(); ctx.arc(x, y, fs/2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#93c5fd'; ctx.font = `${fs*0.5}px serif`; ctx.textAlign='center';
    ctx.fillText('вқ„пёҸ', x, y-s*0.2);
  }
  // body
  const bw = s*(m.isBoss?1.2:0.8), bh = s*(m.isBoss?1.2:0.8);
  ctx.fillStyle = m.color;
  ctx.beginPath(); ctx.arc(x, y, bw/2, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = m.isBoss ? '#ff0' : 'rgba(255,255,255,0.3)';
  ctx.lineWidth = m.isBoss?3*scale:1.5*scale;
  ctx.stroke();
  // boss crown
  if (m.isBoss) {
    ctx.font = `${s*0.6}px serif`; ctx.textAlign='center';
    ctx.fillText('рҹ‘‘', x, y-bh*0.55);
    // aura
    ctx.strokeStyle = `rgba(255,0,0,${0.2+Math.sin(Date.now()/300)*0.1})`;
    ctx.lineWidth = 2*scale;
    ctx.beginPath(); ctx.arc(x, y, bw*0.75, 0, Math.PI*2); ctx.stroke();
  }
  // icon
  ctx.font = `${s*0.7}px serif`; ctx.textAlign = 'center';
  ctx.fillText(m.icon, x, y+s*0.15);
  // HP bar
  drawHpBar(x, y-bh*0.6, bw*0.7, 2.5*scale, m.hp, m.maxHp);
}

function drawHpBar(x, y, w, h, hp, max) {
  const pct = Math.max(0, hp/max);
  ctx.fillStyle = '#333';
  ctx.fillRect(x-w/2, y, w, h);
  ctx.fillStyle = pct>0.6?'#4ade80':pct>0.3?'#fbbf24':'#ef4444';
  ctx.fillRect(x-w/2, y, w*pct, h);
  ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 0.5;
  ctx.strokeRect(x-w/2, y, w, h);
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function shadeColor(color, percent) {
  const num = parseInt(color.replace('#',''), 16);
  const amt = Math.round(2.55*percent);
  const R = Math.max(0,Math.min(255,(num>>16)+amt));
  const G = Math.max(0,Math.min(255,((num>>8)&0x00FF00)+amt));
  const B = Math.max(0,Math.min(255,(num&0x0000FF)+amt));
  return '#'+(0x1000000+R*0x10000+G*0x100+B).toString(16).slice(1);
}

// ==================== зІ’еӯҗзі»з»ҹ ====================
function spawnParticles(x, y, color, count) {
  for(let i=0; i<count; i++) {
    const angle = Math.random()*Math.PI*2;
    const speed = 2+Math.random()*4;
    S.particles.push({
      x, y, color,
      vx: Math.cos(angle)*speed*scale,
      vy: Math.sin(angle)*speed*scale-2*scale,
      life: 30+Math.random()*20, maxLife:50,
      size: 2+Math.random()*3*scale,
    });
  }
}

function updateParticles() {
  S.particles = S.particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.15*scale;
    p.life--;
    return p.life > 0;
  });
}

function drawParticles() {
  for(const p of S.particles) {
    const alpha = p.life/p.maxLife;
    ctx.fillStyle = p.color.replace(')', `,${alpha})`).replace('rgb', 'rgba');
    if(p.color.startsWith('#')) {
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
    }
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size*alpha, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ==================== дјӨе®іж•°еӯ— ====================
function spawnDmgNum(x, y, text, color) {
  S.particles.push({
    x, y, text, color, isText: true,
    vy: -3*scale, life: 40, maxLife: 40,
  });
}
// (reusing particle system for dmg numbers)
function drawDmgNums() {
  for(const p of S.particles) {
    if (!p.isText) continue;
    const alpha = p.life/p.maxLife;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = alpha;
    ctx.font = `bold ${12*scale}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.globalAlpha = 1;
}

// ==================== ең°еӣҫз»ҳеҲ¶ ====================
function drawDay() {
  drawGrass();
  // draw paths between buildings
  for(let r=0; r<MAP_H; r++) {
    for(let c=0; c<MAP_W; c++) {
      const hasB = S.buildings.some(b=>b.col===c&&b.row===r);
      if (!hasB) drawBuildSlot(c, r);
    }
  }
  // draw buildings
  for(const b of S.buildings) drawBuilding(b);
  // draw hero on map center
  const hx = ox + (MAP_W/2)*TILE*scale;
  const hy = oy + (MAP_H-1.5)*TILE*scale;
  drawHeroUnit(hx, hy, S.hero, false);
  // draw units around hero
  const alive = S.units.filter(u=>u.alive);
  alive.forEach((u,i) => {
    const angle = (i/alive.length)*Math.PI*2 - Math.PI/2;
    const rad = TILE*1.2*scale;
    u.x = hx + Math.cos(angle)*rad;
    u.y = hy + Math.sin(angle)*rad;
    drawUnitSprite(u);
  });

  if (S.dailyProd) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';

    ctx.fillRect(bx, by, 2.5*TILE*scale, 2.2*TILE*scale);

    let li=0;
    for(const [k,v] of Object.entries(S.dailyProd)) {
      if(v>0) { ctx.fillText(`${resIcon(k)} +${v}/еӨ©`, bx+8*scale, by+16*scale+li*14*scale); li++; }
    }

}

function resIcon(r) { return {wood:'рҹҢІ',stone:'рҹӘЁ',food:'рҹҢҫ',gold:'рҹ’°',glory:'вӯҗ'}[r]||r; }

function drawNight() {
  // dark background
  ctx.fillStyle = COLORS.night;
  ctx.fillRect(0, 0, cw, ch);
  // moon
  ctx.fillStyle = 'rgba(255,255,200,0.3)';
  ctx.beginPath(); ctx.arc(cw*0.85, ch*0.12, 30*scale, 0, Math.PI*2); ctx.fill();
  // ground line
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, ch*0.82); ctx.lineTo(cw, ch*0.82); ctx.stroke();
  // gate/fortress on the right
  const gx = cw*0.88, gy = ch*0.6, gw = 40*scale, gh = ch*0.25;
  ctx.fillStyle = '#333';
  ctx.fillRect(gx, gy, gw, gh);
  ctx.fillStyle = '#555';
  ctx.fillRect(gx+gw*0.1, gy, gw*0.8, gh*0.6);
  // battlements
  for(let i=0; i<3; i++) {
    ctx.fillStyle = '#444';
    ctx.fillRect(gx+gw*0.15+gw*0.25*i, gy-8*scale, gw*0.15, 10*scale);
  }
  // "gate" arch
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(gx+gw/2, gy+gh*0.65, gw*0.25, Math.PI, 0); ctx.fill();

  // units on left
  const alive = S.units.filter(u=>u.alive);
  const allCount = Math.max(alive.length, 4);
  alive.forEach((u,i) => {
    const lx = cw*0.08 + (i%4)*TILE*1.1*scale;
    const ly = ch*0.3 + Math.floor(i/4)*TILE*1.2*scale;
    u.x += (lx-u.x)*0.15; u.y += (ly-u.y)*0.15;
    drawUnitSprite(u);
  });
  // hero in front
  const hx = cw*0.05, hy = ch*0.5;
  S.hero._tx = S.hero._tx || hx; S.hero._ty = S.hero._ty || hy;
  S.hero._tx += (hx-S.hero._tx)*0.15;
  S.hero._ty += (hy-S.hero._ty)*0.15;
  drawHeroUnit(S.hero._tx, S.hero._ty, S.hero, true);

  // monsters on right
  const monAlive = S.monsters.filter(m=>m.alive);
  monAlive.forEach((m,i) => {
    const mx = cw*0.65 + (i%3)*TILE*1.2*scale;
    const my = ch*0.25 + Math.floor(i/3)*TILE*1.3*scale;
    m.x += (mx-m.x)*0.12; m.y += (my-m.y)*0.12;
    drawMonsterSprite(m);
  });
}

// ==================== жҲҳж–— ====================
function resolveBattle() {
  const log = [];
  const allies = S.units.filter(u=>u.alive);
  const hero = S.hero;
  let enemies = S.monsters.filter(m=>m.alive);
  if ((allies.length===0) && (!hero||hero.hp<=0)) {
    log.push('рҹ’Җ жІЎжңүеҚ•дҪҚеҸҜд»ҘжҲҳж–—пјҒ');
    return {log, won:false};
  }
  if (enemies.length===0) return {log, won:true};
  const wallBonus = (S.buildings.filter(b=>b.type==='wall').length)*3;
  // hero attacks
  if (hero&&hero.hp>0&&enemies.length>0) {
    const t = enemies[0];
    const dmg = Math.max(1, hero.atk - t.def);
    t.hp -= dmg; t.alive = t.hp>0;
    spawnDmgNum(t.x, t.y-10*scale, `-${dmg}`, '#fbbf24');
    spawnParticles(t.x, t.y, 'rgb(240,192,64)', 5);
    log.push(`рҹҰёиӢұйӣ„ж”»еҮ»вҶ’${t.icon}${t.name} -${dmg}`);
    enemies = enemies.filter(m=>m.alive);
  }
  // allies attack
  for(const u of allies) {
    if(enemies.length===0) break;
    const t = enemies[Math.floor(Math.random()*enemies.length)];
    const dmg = Math.max(1, u.atk-t.def);
    t.hp -= dmg; t.alive = t.hp>0;
    spawnDmgNum(t.x, t.y-5*scale, `-${dmg}`, '#ef4444');
    spawnParticles(t.x, t.y, 'rgb(255,200,200)', 3);
    log.push(`${u.icon}${u.name}вҶ’${t.icon}${t.name} -${dmg}`);
    if (!t.alive) {
      spawnParticles(t.x, t.y, 'rgb(255,255,255)', 10);
      log.push(`рҹ’Ҙ ${t.name}иў«еҮ»иҙҘпјҒ`);
    }
    enemies = enemies.filter(m=>m.alive);
  }
  // healer heals
  for(const u of allies) {
    if(u.role==='healer'&&u.heal>0) {
      const targets = [...allies, hero].filter(a=>a&&a.hp>0&&a.hp<a.maxHp).sort((a,b)=>a.hp/a.maxHp-b.hp/b.maxHp);
      if(targets.length>0) {
        const t = targets[0]; const h = u.heal;
        t.hp = Math.min(t.maxHp, t.hp+h);
        spawnDmgNum(t.x, t.y-5*scale, `+${h}`, '#4ade80');
        log.push(`рҹ’ҡ${u.name}жІ»з–—вҶ’${t.name||'иӢұйӣ„'}+${h}`);
      }
    }
  }
  // enemies attack
  for(const m of enemies) {
    if(!m.alive||m.frozen) continue;
    const targets = [...allies, hero].filter(a=>a&&a.hp>0);
    if(targets.length===0) break;
    const tanks = targets.filter(a=>a.role==='tank'||a.role==='elite');
    const t = tanks.length>0 ? R(tanks) : R(targets);
    const dmg = Math.max(1, m.atk-(t.def+wallBonus));
    t.hp -= dmg;
    spawnDmgNum(t.x||S.hero._tx, (t.y||S.hero._ty)-5*scale, `-${dmg}`, '#fff');
    spawnParticles(t.x||S.hero._tx, t.y||S.hero._ty, 'rgb(255,100,100)', 3);
    log.push(`${m.icon}${m.name}вҶ’${t.name||'иӢұйӣ„'} -${dmg}`);
    if(t.hp<=0) {
      if(t===hero) { hero.hp=0; log.push('рҹ’Җ иӢұйӣ„еҖ’дёӢдәҶпјҒ'); }
      else { t.alive=false; t.hp=0; log.push(`рҹ’Җ ${t.name}йҳөдәЎпјҒ`); }
    }
  }
  // unfreeze
  for(const m of S.monsters) delete m.frozen;
  enemies = S.monsters.filter(m=>m.alive);
  const won = enemies.length===0;
  if(won) {
    const isBoss = S.wave%5===0;
    const glory = isBoss?5+S.day:2+Math.floor(S.day/3);
    S.res.glory += glory;
    log.push(`вҡ”пёҸ жіўж¬Ў${S.wave}еҮ»йҖҖпјҒвӯҗ+${glory}`);
    if(isBoss) { S.bossKills++; log.push('рҹ‘‘ Bossиў«еҮ»иҙҘпјҒ'); }
    if(S.items.includes('herb')) {
      for(let u of S.units) { if(u.alive) u.hp=Math.min(u.maxHp,u.hp+Math.floor(u.maxHp*0.1)); }
      if(hero&&hero.hp>0) hero.hp=Math.min(hero.maxHp,hero.hp+Math.floor(hero.maxHp*0.1));
      log.push('рҹҢҝиҚҜиҚүеӣһеӨҚ10%HP');
    }
    // tavern heal
    if(S.buildings.some(b=>b.type==='tavern')) {
      for(let u of S.units) { if(u.alive) u.hp=Math.min(u.maxHp,u.hp+Math.floor(u.maxHp*0.25)); }
      log.push('рҹҚәй…’йҰҶеӣһеӨҚ25%HP');
    }
  }
  return {log, won};
}

function useHeroAbility() {
  const log = [];
  const h = S.hero;
  h.cdLeft = h.cd;
  if(h.name==='зҒ«з„°йўҶдё»') {
    const dmg = h.atk*2;
    for(const m of S.monsters) {
      if(!m.alive) continue;
      m.hp -= Math.max(1,dmg-m.def);
      m.alive = m.hp>0;
      spawnParticles(m.x, m.y, 'rgb(255,150,50)', 8);
      spawnDmgNum(m.x, m.y-5*scale, `-${Math.max(1,dmg-m.def)}`, '#f97316');
    }
    S.shakeTimer = 15;
    log.push('рҹ”Ҙ зғҲз„°йЈҺжҡҙпјҒе…ЁеңәжҖӘзү©еҸ—еҲ°дјӨе®іпјҒ');
  } else if(h.name==='еҶ°йңңеҘізҺӢ') {
    for(const m of S.monsters) { m.frozen = true; spawnParticles(m.x, m.y, 'rgb(147,197,253)', 5); }
    log.push('вқ„пёҸ жһҒеҜ’еҶ°е°ҒпјҒжүҖжңүжҖӘзү©еҶ»з»“1еӣһеҗҲпјҒ');
  } else if(h.name==='еңЈе…үйӘ‘еЈ«') {
    const shield = Math.floor(h.atk*1.5);
    for(let u of S.units) { if(u.alive) u.hp=Math.min(u.maxHp,u.hp+shield); }
    if(h.hp>0) h.hp=Math.min(h.maxHp,h.hp+shield);
    log.push(`вңЁ зҘһеңЈжҠӨзӣҫпјҒе…ЁдҪ“еӣһеӨҚ${shield}HPпјҒ`);
  }
  return log;
}

// ==================== йҳ¶ж®өз®ЎзҗҶ ====================
function calcProd() {
  const p = {wood:0,stone:0,food:0,gold:0};
  for(const b of S.buildings) {
    const cfg = BUILD_DEFS[b.type];
    if(cfg.prod) for(const[k,v] of Object.entries(cfg.prod)) p[k]=(p[k]||0)+v;
  }
  S.dailyProd = p;
}

function startDay() {
  S.phase = 'day'; S.wave = 0; S.monsters = []; S.particles = [];
  S.hero.cdLeft = 0;
  for(let u of S.units) { u.alive = true; u.hp = u.maxHp; }
  S.hero.hp = S.hero.maxHp;
  // init unit positions
  const hx = ox + (MAP_W/2)*TILE*scale, hy = oy + (MAP_H-1.5)*TILE*scale;
  S.units.forEach((u,i)=>{
    u.x = hx+(Math.random()-0.5)*TILE*2*scale;
    u.y = hy+(Math.random()-0.5)*TILE*2*scale;
  });
  calcProd();
  for(const[k,v] of Object.entries(S.dailyProd)) S.res[k]=(S.res[k]||0)+v;
  updateUI();
}

function startNight() {
  S.phase = 'night'; S.wave = 1; S.particles = [];
  spawnWave();
  // init night positions
  for(let u of S.units) { u.x=cw*0.1; u.y=ch*0.3+Math.random()*ch*0.3; }
  S.hero._tx = cw*0.05; S.hero._ty = ch*0.5;
  for(let m of S.monsters) { m.x=cw*0.7+Math.random()*cw*0.2; m.y=ch*0.2+Math.random()*ch*0.5; }
  updateUI();
}

function spawnWave() {
  const isBoss = S.wave%5===0;
  if(isBoss) {
    const bi = Math.min(S.bossKills, BOSSES.length-1);
    const b = BOSSES[bi];
    const s = 1+S.day*0.15;
    S.monsters = [{
      ...b, hp:Math.floor(b.hp*s), maxHp:Math.floor(b.hp*s),
      atk:Math.floor(b.atk*s), def:Math.floor(b.def*s),
      x:cw*0.75, y:ch*0.35, alive:true, isBoss:true, frozen:false,
    }];
  } else {
    const count = 2+Math.floor(S.day/3);
    const s = 1+S.day*0.1;
    S.monsters = [];
    for(let i=0; i<count; i++) {
      const m = R(MONSTERS);
      S.monsters.push({
        ...m, hp:Math.floor(m.hp*s), maxHp:Math.floor(m.hp*s),
        atk:Math.floor(m.atk*s), def:Math.floor(m.def*s),
        x:cw*0.7+Math.random()*cw*0.2, y:ch*0.2+Math.random()*ch*0.5,
        alive:true, isBoss:false, frozen:false,
      });
    }
  }
}

function fightWave() {
  const result = resolveBattle();
  addBattleLog(result.log);
  updateUI();
  const alives = S.units.filter(u=>u.alive);
  if(!result.won && alives.length===0 && (!S.hero||S.hero.hp<=0)) {
    setTimeout(()=>endGame(false), 1500);
  }
}

function nextWave() {
  if(S.hero.cdLeft>0) { S.hero.cdLeft--; }
  S.wave++;
  if(S.wave > S.maxWaves) {
    S.day++;
    if(S.day > S.winDays) { endGame(true); return; }
    startDay();
    return;
  }
  spawnWave();
  for(let m of S.monsters) { m.x=cw*0.7+Math.random()*cw*0.2; m.y=ch*0.2+Math.random()*ch*0.5; }
  S.particles = [];
  S.battleLog = [];
  updateUI();
}

function endGame(won) {
  S.phase = 'gameOver';
  updateUI();
}

function openBuildMenu(col, row) {

        updateUI();
        toast(`вң… иҺ·еҫ—${v.name}пјҒ`);
      }
    };
  }));
}

// ==================== UI ====================
function updateUI() {
  // resource bar
  document.getElementById('res-bar').innerHTML = ['wood','stone','food','gold','glory'].map(r=>{
    const v = S.res[r]||0;
    const prod = S.dailyProd[r]||0;
    return `<div class="res"><span class="icon">${resIcon(r)}</span><span class="val">${v}</span>${S.phase==='day'&&prod>0?`<span style="color:#4ade80;font-size:0.7em">+${prod}</span>`:''}</div>`;
  }).join('');

  // phase info
  const ph = document.getElementById('phase-info');
  if(S.phase==='day') ph.innerHTML = `вҳҖпёҸ з¬¬<span>${S.day}</span>еӨ© В· зҷҪеӨ©`;
  else if(S.phase==='night') {
    const isBoss = S.wave%5===0;
    ph.innerHTML = `рҹҢҷ з¬¬<span>${S.day}</span>еӨ© В· жіўж¬Ў${S.wave}/${S.maxWaves} ${isBoss?'рҹ‘‘BOSS':''}`;
  } else if(S.phase==='gameOver') ph.innerHTML = S.day>S.winDays?'рҹ‘‘ иғңеҲ©пјҒ':'рҹ’Җ зҺӢеӣҪжІҰйҷ·';
  else ph.innerHTML = 'йҖүжӢ©иӢұйӣ„';

  // bottom bar
  const bb = document.getElementById('bottom-bar');
  if(S.phase==='day') {
    bb.innerHTML = `
      <button class="btn btn-build" onclick="openBuildMenu(5,3)">рҹҸ—пёҸ е»әйҖ </button>
      <button class="btn btn-recruit" onclick="openRecruitMenu()">рҹ‘Ҙ жӢӣеӢҹ</button>
      <button class="btn btn-item" onclick="openItemMenu()">вӯҗ е•Ҷеә—</button>
      <button class="btn btn-end" onclick="startNight()">рҹҢҷ иҝӣе…ҘеӨңжҷҡ</button>
    `;
  } else if(S.phase==='night') {
    const hasEnemy = S.monsters.some(m=>m.alive);
    const heroReady = S.hero && S.hero.cdLeft <= 0;
    bb.innerHTML = `
      ${heroReady ? `<button class="btn btn-hero" onclick="doHeroAbility()">рҹҺҜ ${S.hero.ab}!</button>` : ''}
      ${hasEnemy ? `<button class="btn btn-fight" onclick="fightWave()">вҡ”пёҸ жҲҳж–—!</button>` : ''}
      ${!hasEnemy && S.wave<S.maxWaves ? `<button class="btn btn-fight" onclick="nextWave()">вһЎпёҸ дёӢдёҖжіў</button>` : ''}
      ${!hasEnemy && S.wave>=S.maxWaves ? `<button class="btn btn-fight" style="background:#4ade80;color:#1a1a2e" onclick="nextWave()">вҳҖпёҸ еӨ©дә®</button>` : ''}
    `;
  } else if(S.phase==='gameOver') {
    bb.innerHTML = `<button class="btn btn-fight" onclick="location.reload()">рҹ”„ еҶҚжқҘдёҖеұҖ</button>`;
  } else {
    bb.innerHTML = '';
  }

  // battle log
  const bl = document.getElementById('battle-log');
  if(S.phase==='night') {
    bl.style.display = 'block';
    bl.innerHTML = S.battleLog.slice(-8).join('<br>');
  } else {
    bl.style.display = 'none';
  }
}

function addBattleLog(msgs) {
  S.battleLog.push(...msgs);
  if(S.battleLog.length > 20) S.battleLog = S.battleLog.slice(-20);
  const bl = document.getElementById('battle-log');
  if(bl) bl.innerHTML = S.battleLog.slice(-8).join('<br>');
}

function doHeroAbility() {
  const log = useHeroAbility();
  addBattleLog(log);
  updateUI();
  toast('рҹҺҜ иӢұйӣ„жҠҖиғҪйҮҠж”ҫпјҒ');
}

// ==================== иҸңеҚ•иҰҶзӣ–еұӮ ====================
function showMenu(title, items) {
  const overlay = document.getElementById('menu-overlay');
  const panel = document.getElementById('menu-panel');
  panel.innerHTML = `
    <h3>${title}</h3>
    <div class="menu-grid">
      ${items.map((it,i)=>`
        <div class="menu-card ${it.disabled?'disabled':''}" onclick="menuAction(${i})" data-idx="${i}">
          <div class="title">${it.title}</div>
          <div class="sub">${it.sub||''}</div>
          <div class="price">${it.price||''}</div>
        </div>
      `).join('')}
    </div>
    <button class="menu-close" onclick="closeMenu()">вң• е…ій—ӯ</button>
  `;
  panel._items = items;
  overlay.style.display = 'flex';
}

function menuAction(idx) {
  const panel = document.getElementById('menu-panel');
  const item = panel._items[idx];
  if(item && item.action) item.action();
}

function closeMenu() {
  document.getElementById('menu-overlay').style.display = 'none';
  S.buildSlot = null;
}

// ==================== з”»еёғзӮ№еҮ» ====================
canvas.addEventListener('click', (e) => {
  if(S.phase!=='day') return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const col = Math.floor((mx - ox) / (TILE*scale));
  const row = Math.floor((my - oy) / (TILE*scale));
  if(col>=0 && col<MAP_W && row>=0 && row<MAP_H) {
    const hasB = S.buildings.some(b=>b.col===col&&b.row===row);
    if(!hasB) openBuildMenu(col, row);
  }
});

// ==================== иӢұйӣ„йҖүжӢ© ====================
function showHeroSelect() {
  const overlay = document.getElementById('menu-overlay');
  const panel = document.getElementById('menu-panel');
  panel.innerHTML = `
    <h3>вҡ”пёҸ йҖүжӢ©дҪ зҡ„е®ҲжҠӨиҖ…</h3>
    <p style="text-align:center;color:#aaa;font-size:0.85em;margin-bottom:8px;">зҷҪеӨ©е»әйҖ В·еӨңжҷҡе®ҲеҹҺВ·еӯҳжҙ»${S.winDays}еӨ©еҚіиғңеҲ©</p>
    ${HEROES.map((h,i)=>`
      <div class="menu-card" style="display:block;margin-bottom:6px;" onclick="selectHero(${i})">
        <div style="font-size:2em;">${h.icon}</div>
        <div class="title">${h.name}</div>
        <div class="sub">рҹҺҜ ${h.ab}: ${h.abDesc}</div>
        <div class="price">еҶ·еҚҙ: ${h.cd}еӣһеҗҲ</div>
      </div>
    `).join('')}
  `;
  overlay.style.display = 'flex';
}

function selectHero(idx) {
  const h = HEROES[idx];
  S.hero = {
    name:h.name, icon:h.icon, color:h.color,
    hp:60, maxHp:60, atk:12, baseAtk:12, def:3, baseDef:3,
    ab:h.ab, abDesc:h.abDesc, cd:h.cd, cdLeft:0,
    _tx:0, _ty:0,
  };
  closeMenu();
  S.day = 1;
  S.buildSlot = null;
  startDay();
}

// ==================== з”»еёғжёІжҹ“еҫӘзҺҜ ====================
function render() {
  ctx.clearRect(0, 0, cw, ch);
  resize();
  if(S.phase==='day') {
    drawDay();
  } else if(S.phase==='night') {
    drawNight();
  } else if(S.phase==='gameOver') {
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, cw, ch);
    const won = S.day > S.winDays;
    ctx.fillStyle = '#fff'; ctx.font = `bold ${24*scale}px sans-serif`; ctx.textAlign='center';
    ctx.fillText(won?'рҹ‘‘ зҺӢеӣҪе®ҲеҚ«жҲҗеҠҹпјҒ':'рҹ’Җ зҺӢеӣҪжІҰйҷ·...', cw/2, ch*0.35);
    ctx.font = `${13*scale}px sans-serif`; ctx.fillStyle = '#aaa';
    ctx.fillText(`еӯҳжҙ» ${S.day} еӨ© | BossеҮ»жқҖ ${S.bossKills} | иҚЈиҖҖ ${S.res.glory}`, cw/2, ch*0.45);
    ctx.fillText(`жӢӣеӢҹ ${S.units.length} еҚ•дҪҚ | е»әзӯ‘ ${S.buildings.length} еә§`, cw/2, ch*0.5);
  }

  // particles on top of everything
  updateParticles();
  drawParticles();
  drawDmgNums();

  // remove text particles (dmg numbers)
  S.particles = S.particles.filter(p => !p.isText || p.life > 0);

  // shake effect
  if(S.shakeTimer>0) {
    S.shakeTimer--;
    const sx = (Math.random()-0.5)*6*scale*(S.shakeTimer/15);
    const sy = (Math.random()-0.5)*6*scale*(S.shakeTimer/15);
    // already rendered, just offset via transform on next frame
  }

  requestAnimationFrame(render);
}

// ==================== й”®зӣҳеҝ«жҚ·й”® ====================
document.addEventListener('keydown', e => {
  if(e.key==='Escape') closeMenu();
  if(e.key==='b' && S.phase==='day') openBuildMenu(5,3);
  if(e.key==='r' && S.phase==='day') openRecruitMenu();
  if(e.key==='i' && S.phase==='day') openItemMenu();
  if(e.key===' ' && S.phase==='night') {
    e.preventDefault();
    const hasEnemy = S.monsters.some(m=>m.alive);
    if(hasEnemy) fightWave();
    else nextWave();
  }
  if(e.key==='q' && S.phase==='night' && S.hero&&S.hero.cdLeft<=0) doHeroAbility();
});

// ==================== еҗҜеҠЁ ====================
function init() {
  resize();
  showHeroSelect();
  updateUI();
}
init();
render();
</script>
